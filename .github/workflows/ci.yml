# ──────────────────────────────────────────────────────────────────
# CI / Release workflow for WadwaitaUp
#
# ┌─────────────────────────────────────────────────────────────┐
# │ Triggered on every pull_request → build matrix runs and     │
# │ results are visible as PR checks (reviewer can verify all   │
# │ three platforms compile and import successfully).           │
# │                                                             │
# │ Triggered on v* tag push → same build matrix, then the      │
# │ "release" job waits for a reviewer to approve the           │
# │ deployment environment in the GitHub UI, then automatically │
# │ publishes a GitHub Release with all platform packages.      │
# │                                                             │
# │ One-time setup required in GitHub → Settings → Environments:│
# │   Create an environment named "release" and add yourself    │
# │   (or another maintainer) as a Required Reviewer.          │
# └─────────────────────────────────────────────────────────────┘
# ──────────────────────────────────────────────────────────────────

name: CI / Release

on:
  pull_request:
    branches: [main]
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ── Build & verify on every platform ──────────────────────────
  build:
    name: Build · ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false   # keep going so all three results are visible
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── Install GTK4 / Libadwaita ──────────────────────────────

      - name: Install GTK4 dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-gi python3-gi-cairo \
            gir1.2-gtk-4.0 gir1.2-adw-1

      - name: Install GTK4 dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install pygobject3 gtk4 libadwaita

      - name: Set up MSYS2 with GTK4 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-python-gobject
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita

      # ── Verify Python syntax (all platforms, standard Python) ──

      - name: Verify Python syntax
        run: |
          python -m py_compile main.py
          python -m py_compile models.py
          python -m py_compile storage.py
          python -m py_compile importer.py
          python -m py_compile utils.py
          python -m py_compile window.py

      # ── Verify GTK4 imports ────────────────────────────────────
      # Each platform uses the Python interpreter that actually has
      # the GTK4 bindings installed; this differs from setup-python's
      # interpreter which lives in the toolcache and cannot see system
      # or Homebrew packages.

      - name: Verify GTK4 imports (Linux)
        if: runner.os == 'Linux'
        run: |
          /usr/bin/python3 -c "
          import gi
          gi.require_version('Gtk', '4.0')
          gi.require_version('Adw', '1')
          from gi.repository import Gtk, Adw
          print('GTK4 + Libadwaita imported successfully')
          "

      - name: Verify GTK4 imports (macOS)
        if: runner.os == 'macOS'
        run: |
          "$(brew --prefix)/bin/python3" -c "
          import gi
          gi.require_version('Gtk', '4.0')
          gi.require_version('Adw', '1')
          from gi.repository import Gtk, Adw
          print('GTK4 + Libadwaita imported successfully')
          "

      - name: Verify GTK4 imports (Windows / MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          python -c "
          import gi
          gi.require_version('Gtk', '4.0')
          gi.require_version('Adw', '1')
          from gi.repository import Gtk, Adw
          print('GTK4 + Libadwaita imported successfully')
          "

      # ── Build source package ───────────────────────────────────

      - name: Build source package
        shell: python
        run: |
          import os, shutil, pathlib, zipfile

          ref = os.environ.get("GITHUB_REF_NAME", "dev").replace("/", "-").replace("\\", "-")
          platform = "${{ matrix.platform }}"
          pkg_name = f"WadwaitaUp-{ref}-{platform}"
          pkg_dir  = pathlib.Path("dist") / pkg_name

          pkg_dir.mkdir(parents=True, exist_ok=True)

          files = [
              "main.py", "models.py", "storage.py",
              "importer.py", "utils.py", "window.py",
              "install.sh", "README.md",
          ]
          for f in files:
              shutil.copy(f, pkg_dir / f)

          zip_path = pathlib.Path(f"{pkg_name}.zip")
          with zipfile.ZipFile(zip_path, "w", zipfile.ZIP_DEFLATED) as zf:
              for path in pkg_dir.rglob("*"):
                  zf.write(path, path.relative_to("dist"))

          print(f"Created {zip_path} ({zip_path.stat().st_size} bytes)")

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.platform }}
          path: WadwaitaUp-*.zip
          if-no-files-found: error

  # ── Publish GitHub Release (tag builds only, after approval) ──
  release:
    name: Release
    needs: [build, android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    # This environment requires a reviewer to approve the deployment
    # in the GitHub UI before the job proceeds.
    # Set it up once at:
    #   Repository → Settings → Environments → New environment → "release"
    #   → Required reviewers → add yourself
    environment: release

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all platform packages
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: packages/

      - name: List release assets
        run: ls -lh packages/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ── Android APK build ─────────────────────────────────────────
  android:
    name: Build · android
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Buildozer currently has the best compatibility with 3.11
          python-version: '3.11'

      - name: Install Buildozer system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev cmake \
            libffi-dev libssl-dev

      - name: Install Buildozer and Cython
        run: pip install --upgrade buildozer cython==3.0.11

      # Cache the heavy Android SDK/NDK + p4a build artefacts so that
      # subsequent runs finish in minutes instead of 30+ minutes.
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}-${{ runner.os }}
          restore-keys: buildozer-

      # Buildozer 1.5.0 looks for sdkmanager exclusively at
      # <sdk>/tools/bin/sdkmanager (the old "SDK Tools" layout).
      # Modern GitHub Actions runners only ship the new "cmdline-tools" layout
      # where sdkmanager lives at <sdk>/cmdline-tools/latest/bin/sdkmanager.
      #
      # Fix: create the directory structure Buildozer expects and put a thin
      # wrapper script at tools/bin/sdkmanager that delegates to the real
      # sdkmanager already present on the runner.  Then pre-write the
      # well-known license hash files so sdkmanager skips interactive prompts.
      - name: Set up Android SDK for Buildozer
        run: |
          set -e
          BUILDOZER_SDK="${HOME}/.buildozer/android/platform/android-sdk"

          # Locate the real sdkmanager that ships with the GitHub Actions runner.
          if   [ -f "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" ]; then
            REAL_SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          elif [ -f "/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager" ]; then
            REAL_SDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
          else
            echo "ERROR: cannot find system sdkmanager" >&2; exit 1
          fi

          # Create the wrapper at the location Buildozer 1.5.0 expects.
          mkdir -p "${BUILDOZER_SDK}/tools/bin"
          printf '#!/usr/bin/env bash\nexec "%s" "$@"\n' "${REAL_SDKMANAGER}" \
            > "${BUILDOZER_SDK}/tools/bin/sdkmanager"
          chmod +x "${BUILDOZER_SDK}/tools/bin/sdkmanager"

          # Pre-write well-known license hashes so sdkmanager treats all
          # packages (including build-tools RC releases) as already accepted.
          mkdir -p "${BUILDOZER_SDK}/licenses"
          # Standard Android SDK license
          printf '%s\n' \
            '8933bad161af4178b1185d1a37fbf41ea5269c55' \
            'd56f5187479451eabf01fb78af6dfcb131a6481e' \
            '24333f8a63b6825ea9c5514f83c2829b004d1fee' \
            > "${BUILDOZER_SDK}/licenses/android-sdk-license"
          # Preview / RC packages (build-tools 37-rc2 requires this)
          printf '%s\n' \
            '84831b9409646a918e30573bab4c9c91346d8abd' \
            > "${BUILDOZER_SDK}/licenses/android-sdk-preview-license"

      - name: Build Android APK (debug)
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-android
          path: bin/*.apk
          if-no-files-found: error
